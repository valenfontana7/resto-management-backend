services:
  postgres-lab:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bentoo_lab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5442:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bentoo_lab"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - bentoo_lab_postgres:/var/lib/postgresql/data

volumes:
  bentoo_lab_postgres:
