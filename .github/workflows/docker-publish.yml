name: Docker Publish

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: valenfontana7/resto-management-backend
  BUILD_DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/resto_db?schema=public

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL != '' && secrets.DATABASE_URL || env.BUILD_DATABASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set deploy image tag
        id: image
        run: echo "tag=${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  deploy-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: vars.VPS_DEPLOY_ENABLED == 'true'
    environment: production

    steps:
      - name: Validate deploy secrets
        run: |
          missing=""
          [ -z "${{ secrets.VPS_HOST }}" ] && missing="$missing VPS_HOST"
          [ -z "${{ secrets.VPS_USER }}" ] && missing="$missing VPS_USER"
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && missing="$missing VPS_SSH_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Faltan secrets de deploy:$missing"
            echo "::error::Configuralos en el environment 'production' o a nivel repo."
            exit 1
          fi

      - name: Deploy to VPS
        env:
          DOCKERHUB_IMAGE: ${{ needs.build-and-push.outputs.image_tag }}
          VPS_APP_PATH: ${{ vars.VPS_APP_PATH }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -eu
          printf '%s\n' "$VPS_SSH_KEY" > "$RUNNER_TEMP/deploy_key"
          chmod 600 "$RUNNER_TEMP/deploy_key"
          if ! ssh-keygen -y -f "$RUNNER_TEMP/deploy_key" >/dev/null 2>&1; then
            echo "::error::VPS_SSH_KEY no es una clave privada valida."
            exit 1
          fi

          APP_DIR="${VPS_APP_PATH:-/var/www/resto-management-backend}"
          ssh -i "$RUNNER_TEMP/deploy_key" \
            -o StrictHostKeyChecking=accept-new \
            -o BatchMode=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "set -eu
             cd '${APP_DIR}'
             export DOCKERHUB_IMAGE='${DOCKERHUB_IMAGE}'
             echo '==> Pull '${DOCKERHUB_IMAGE}
             docker compose -f docker-compose.prod.yml pull app
             echo '==> Up app'
             docker compose -f docker-compose.prod.yml up -d --remove-orphans app
             docker image prune -f
             echo 'Deploy listo: '${DOCKERHUB_IMAGE}"
